<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e5c28">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <title>Tabela de Preços</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-top">
      <div class="header-marca">
        <div class="header-logo-wrap"><img src="logo.png" alt="Logo" class="header-logo"></div>
        <div>
          <h1 id="header-titulo">Bell Corpus</h1>
          <span class="header-sub" id="header-sub">Cosméticos Atacadista</span>
        </div>
      </div>
      <span class="tabela-data">Abr/2026</span>
    </div>

    <!-- Abas de marca -->
    <div class="nav-abas">
      <button class="aba-btn active" data-aba="bellcorpus">Bell Corpus</button>
      <button class="aba-btn" data-aba="glamour">Glamour</button>
      <button class="aba-btn" data-aba="depile">Depile Plus</button>
      <button class="aba-btn" data-aba="outros">Outros</button>
    </div>

    <!-- Controles Bell Corpus -->
    <div id="header-bellcorpus">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="busca" placeholder="Buscar produto..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn hidden" id="clear-busca" aria-label="Limpar">✕</button>
      </div>
      <div class="categorias-wrap">
        <div class="categorias" id="categorias">
          <button class="cat-btn active" data-cat="todas">Todas</button>
        </div>
      </div>
    </div>

    <!-- Controles Glamour -->
    <div id="header-glamour" class="hidden">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="busca-cat" placeholder="Buscar no catálogo..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn hidden" id="clear-busca-cat" aria-label="Limpar">✕</button>
      </div>
      <div class="categorias-wrap">
        <div class="categorias" id="filtros-cat">
          <button class="cat-btn active" data-cat="todos">Todos</button>
          <button class="cat-btn" data-cat="hidratacao">Hidratação</button>
          <button class="cat-btn" data-cat="liso">Liso</button>
          <button class="cat-btn" data-cat="cachos">Cachos</button>
          <button class="cat-btn" data-cat="nutricao">Nutrição</button>
          <button class="cat-btn" data-cat="crescimento">Crescimento</button>
          <button class="cat-btn" data-cat="tratamento">Tratamento</button>
          <button class="cat-btn" data-cat="perfume">Perfume</button>
          <button class="cat-btn" data-cat="outros">Outros</button>
        </div>
      </div>
    </div>

    <!-- Controles Depile Plus -->
    <div id="header-depile" class="hidden">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="busca-depile" placeholder="Buscar produto..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn hidden" id="clear-busca-depile" aria-label="Limpar">✕</button>
      </div>
      <div class="categorias-wrap">
        <div class="categorias" id="filtros-depile">
          <button class="cat-btn active" data-cat="todas">Todas</button>
          <button class="cat-btn" data-cat="cera600">Cera 600g</button>
          <button class="cat-btn" data-cat="cera290">Cera 290g</button>
          <button class="cat-btn" data-cat="rollon">Roll-on</button>
          <button class="cat-btn" data-cat="barra">Cera em Barra</button>
          <button class="cat-btn" data-cat="papel">Papel Dep.</button>
          <button class="cat-btn" data-cat="espatula">Espátula</button>
          <button class="cat-btn" data-cat="folhas">Folhas Prontas</button>
          <button class="cat-btn" data-cat="parafina">Parafina</button>
          <button class="cat-btn" data-cat="diversos">Diversos</button>
        </div>
      </div>
    </div>

    <!-- Controles Outros (sem filtro, só busca) -->
    <div id="header-outros" class="hidden">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="busca-outros" placeholder="Buscar produto..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn hidden" id="clear-busca-outros" aria-label="Limpar">✕</button>
      </div>
    </div>
  </header>

  <!-- VIEW BELL CORPUS -->
  <main id="view-bellcorpus">
    <div id="contagem" class="contagem"></div>
    <div id="loading" class="estado-msg">Carregando produtos...</div>
    <div id="grid" class="grid"></div>
    <div id="vazio" class="estado-msg hidden">Nenhum produto encontrado 🔍</div>
  </main>

  <!-- VIEW GLAMOUR -->
  <main id="view-glamour" class="hidden">
    <div id="contagem-cat" class="contagem"></div>
    <div id="grid-cat" class="grid"></div>
    <div id="vazio-cat" class="estado-msg hidden">Nenhum produto encontrado 🔍</div>
  </main>

  <!-- VIEW DEPILE PLUS -->
  <main id="view-depile" class="hidden">
    <div id="contagem-depile" class="contagem"></div>
    <div id="grid-depile" class="grid"></div>
    <div id="vazio-depile" class="estado-msg hidden">Nenhum produto encontrado 🔍</div>
  </main>

  <!-- VIEW OUTROS -->
  <main id="view-outros" class="hidden">
    <div id="contagem-outros" class="contagem"></div>
    <div id="grid-outros" class="grid"></div>
    <div id="vazio-outros" class="estado-msg hidden">Nenhum produto encontrado 🔍</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
